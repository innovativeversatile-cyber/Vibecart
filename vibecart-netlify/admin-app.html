<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>VibeCart Admin App</title>
    <meta name="theme-color" content="#0b1226" />
    <link rel="manifest" href="./admin-app-manifest.json" />
    <style>
      body {
        margin: 0;
        font-family: Inter, "Segoe UI", Arial, sans-serif;
        background:
          radial-gradient(120% 90% at 100% 0%, rgba(97, 58, 179, 0.25), transparent 45%),
          radial-gradient(100% 80% at 0% 100%, rgba(23, 163, 126, 0.18), transparent 45%),
          #070b17;
        color: #e9edff;
        -webkit-font-smoothing: antialiased;
      }
      .wrap {
        max-width: 560px;
        margin: 0 auto;
        padding: 1rem 0.9rem 1.4rem;
      }
      .card {
        border: 1px solid #2a3459;
        border-radius: 14px;
        background: linear-gradient(180deg, rgba(18, 28, 58, 0.94), rgba(11, 19, 41, 0.96));
        box-shadow: 0 14px 36px rgba(6, 10, 25, 0.36);
        padding: 1rem;
        margin-bottom: 1rem;
      }
      .btn {
        display: inline-block;
        border: none;
        border-radius: 10px;
        background: linear-gradient(120deg, #e8a317, #2d9b6a);
        color: #08111f;
        padding: 0.65rem 0.9rem;
        font-weight: 700;
        cursor: pointer;
        text-decoration: none;
        transition: transform 180ms ease, filter 180ms ease;
      }
      .btn:active {
        transform: translateY(1px) scale(0.995);
        filter: brightness(0.96);
      }
      .small {
        color: #a8b0d0;
        font-size: 0.92rem;
      }
      .row {
        display: flex;
        gap: 0.55rem;
        flex-wrap: wrap;
      }
      .hidden {
        display: none;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        border-radius: 10px;
        border: 1px solid #2a3459;
        background: #121b34;
        color: #e9edff;
        padding: 0.6rem 0.7rem;
        margin-bottom: 0.7rem;
      }
      .shine {
        position: relative;
        overflow: hidden;
      }
      .shine::after {
        content: "";
        position: absolute;
        inset: -120% auto -120% -45%;
        width: 34%;
        background: linear-gradient(120deg, transparent, rgba(255, 255, 255, 0.18), transparent);
        transform: translateX(-180%);
        animation: appShine 3.8s ease-in-out infinite;
        pointer-events: none;
      }
      @keyframes appShine {
        0% { transform: translateX(-180%); }
        50% { transform: translateX(380%); }
        100% { transform: translateX(380%); }
      }
      @media (prefers-reduced-motion: reduce) {
        .btn { transition: none; }
        .shine::after { animation: none; }
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="card shine">
        <h1>VibeCart Admin App</h1>
        <p class="small">Admin-only application entry. Use your owner credentials in the panel before making changes.</p>
        <div class="row">
          <button id="installAdminApp" class="btn hidden">Install Admin App</button>
          <button id="enableNotifications" class="btn">Enable Notifications</button>
          <button id="testNotification" class="btn">Send Test Notification</button>
        </div>
        <p id="notifyStatus" class="small">Notification status: checking...</p>
      </section>

      <section id="gateCard" class="card">
        <h2>Admin Device Gate</h2>
        <p class="small">Set a local admin device PIN for quick access on this phone only.</p>
        <input id="devicePin" type="password" placeholder="Enter admin device PIN (min 6 chars)" />
        <button id="openPanelInApp" class="btn">Open Admin Panel</button>
      </section>

      <section id="panelCard" class="card hidden">
        <h2>Owner Panel (App Mode)</h2>
        <p class="small">Opening secure owner panel...</p>
      </section>
    </main>

    <script>
      const PIN_KEY = "vibecart-admin-device-pin";
      const gateCard = document.getElementById("gateCard");
      const panelCard = document.getElementById("panelCard");
      const pinInput = document.getElementById("devicePin");
      const openBtn = document.getElementById("openPanelInApp");
      const installBtn = document.getElementById("installAdminApp");
      const enableNotificationsBtn = document.getElementById("enableNotifications");
      const testNotificationBtn = document.getElementById("testNotification");
      const notifyStatus = document.getElementById("notifyStatus");
      const AUTH_SESSION_KEY = "vibecart-owner-api-session";
      const LAST_UNREAD_KEY = "vibecart-admin-last-unread-count-v1";
      let deferredPrompt = null;
      let swReady = null;

      function hashPin(pin) {
        let hash = 0;
        for (let i = 0; i < pin.length; i += 1) {
          hash = (hash << 5) - hash + pin.charCodeAt(i);
          hash |= 0;
        }
        return String(hash);
      }

      function openPanel() {
        gateCard.classList.add("hidden");
        panelCard.classList.remove("hidden");
        window.location.href = "./admin.html";
      }

      openBtn.addEventListener("click", () => {
        const value = String(pinInput.value || "").trim();
        if (value.length < 6) {
          alert("Use at least 6 characters for device PIN.");
          return;
        }
        const existing = localStorage.getItem(PIN_KEY);
        const hashed = hashPin(value);
        if (existing && existing !== hashed) {
          alert("Wrong device PIN.");
          return;
        }
        if (!existing) {
          localStorage.setItem(PIN_KEY, hashed);
        }
        openPanel();
      });

      window.addEventListener("beforeinstallprompt", (event) => {
        event.preventDefault();
        deferredPrompt = event;
        installBtn.classList.remove("hidden");
      });

      installBtn.addEventListener("click", async () => {
        if (!deferredPrompt) return;
        deferredPrompt.prompt();
        await deferredPrompt.userChoice;
        deferredPrompt = null;
        installBtn.classList.add("hidden");
      });

      function setNotifyStatus(message) {
        notifyStatus.textContent = `Notification status: ${message}`;
      }

      function refreshNotificationState() {
        if (!("Notification" in window)) {
          setNotifyStatus("not supported on this browser/device");
          return;
        }
        setNotifyStatus(Notification.permission);
      }

      function getSessionToken() {
        try {
          const parsed = JSON.parse(localStorage.getItem(AUTH_SESSION_KEY) || "{}");
          return String(parsed.token || "").trim();
        } catch {
          return "";
        }
      }

      async function checkInboxForNewUnread() {
        const token = getSessionToken();
        if (!token) {
          return;
        }
        try {
          const response = await fetch("/api/owner/messages/list", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ authToken: token, token, limit: 40 })
          });
          const payload = await response.json().catch(() => ({}));
          if (!response.ok || !payload.ok) {
            return;
          }
          const unread = Math.max(0, Number(payload.unreadCount || 0));
          const previous = Math.max(0, Number(localStorage.getItem(LAST_UNREAD_KEY) || "0"));
          localStorage.setItem(LAST_UNREAD_KEY, String(unread));
          if (unread > previous && Notification.permission === "granted") {
            const registration = swReady || (await navigator.serviceWorker.ready);
            await registration.showNotification("VibeCart Admin Inbox", {
              body: `You have ${unread} unread admin message${unread === 1 ? "" : "s"}.`,
              icon: "./icon-192.png",
              badge: "./icon-192.png",
              tag: "vibecart-admin-inbox",
              data: { url: "./admin-messages.html" }
            });
          }
        } catch {
          // silent in background check
        }
      }

      enableNotificationsBtn.addEventListener("click", async () => {
        if (!("Notification" in window)) {
          alert("Notifications are not supported on this browser.");
          return;
        }
        const permission = await Notification.requestPermission();
        refreshNotificationState();
        if (permission !== "granted") {
          alert("Notification permission was not granted.");
          return;
        }
        alert("Notifications enabled for this admin app.");
      });

      testNotificationBtn.addEventListener("click", async () => {
        if (!("Notification" in window)) {
          alert("Notifications are not supported on this browser.");
          return;
        }
        if (Notification.permission !== "granted") {
          alert("Please enable notifications first.");
          return;
        }
        try {
          const registration = swReady || (await navigator.serviceWorker.ready);
          await registration.showNotification("VibeCart Admin", {
            body: "Test notification is working on this device.",
            icon: "./icon-192.png",
            badge: "./icon-192.png",
            tag: "vibecart-admin-test"
          });
        } catch (error) {
          alert("Could not send test notification.");
        }
      });

      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .register("./admin-app-sw.js?v=20260501notify1")
            .then(() => navigator.serviceWorker.ready)
            .then((registration) => {
              swReady = registration;
              checkInboxForNewUnread().catch(() => {});
              window.setInterval(() => {
                checkInboxForNewUnread().catch(() => {});
              }, 45000);
            })
            .catch(() => {});
        });
      }

      refreshNotificationState();
    </script>
  </body>
</html>
