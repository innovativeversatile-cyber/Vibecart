<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live market shops · VibeCart</title>
  <link rel="stylesheet" href="./styles.css?v=20260510laneflat1" />
</head>
<body class="shops-lane-page">
  <header class="shops-lane-topbar">
    <a class="btn btn-secondary" href="./live-market.html">← Live market folders</a>
    <a class="btn btn-primary" id="openFullMarketplaceTop" href="./live-market-shops.html?cat=All&amp;view=global">Open full live marketplace</a>
  </header>
  <main class="section alt shops-lane-main">
    <h1 class="shops-lane-title">Global live market shops</h1>
    <p class="note shops-lane-intro" id="liveMarketShopsIntro">
      Pick your region and category, then open a shop — links go straight to the retailer in a new tab.
    </p>
    <div class="admin-grid" style="max-width:32rem;margin-bottom:0.8rem">
      <label for="liveMarketRegionSelect">Market region</label>
      <select id="liveMarketRegionSelect" aria-label="Live market region targeting">
        <option value="auto">Auto</option>
        <option value="africa">Africa cross-border</option>
        <option value="za">South Africa</option>
        <option value="ke">Kenya</option>
        <option value="ng">Nigeria</option>
        <option value="gh">Ghana</option>
        <option value="eg">Egypt</option>
        <option value="ma">Morocco</option>
        <option value="zw">Zimbabwe</option>
        <option value="eu">Europe</option>
        <option value="ie">Ireland (Republic &amp; Northern Ireland)</option>
        <option value="gulf">Gulf</option>
        <option value="asia">Asia</option>
      </select>
    </div>
    <div class="hero-actions" id="liveMarketCategoryTabs" role="tablist" aria-label="Live market categories">
      <button type="button" class="btn btn-secondary" data-live-cat="All">All shops</button>
      <button type="button" class="btn btn-secondary" data-live-cat="Electronics">Electronics</button>
      <button type="button" class="btn btn-secondary" data-live-cat="Fashion">Fashion</button>
      <button type="button" class="btn btn-secondary" data-live-cat="Books">Books</button>
      <button type="button" class="btn btn-secondary" data-live-cat="Gaming">Gaming</button>
    </div>
    <div class="admin-grid" style="max-width:42rem;margin-bottom:0.8rem">
      <label for="liveMarketShopSearch">Search any shop</label>
      <input id="liveMarketShopSearch" type="text" placeholder="Type shop name, e.g. Amazon, Zara, Steam" />
    </div>
    <div class="hero-actions">
      <button type="button" class="btn btn-secondary" id="liveMarketShopSearchBtn">Search shop</button>
      <button type="button" class="btn btn-secondary" id="liveMarketShopResetBtn">Reset list</button>
    </div>
    <p class="note">
      <input id="liveMarketDisclaimerAck" type="checkbox" />
      I understand and accept the marketplace risk and legal responsibility disclaimer.
    </p>
    <p class="note" id="liveMarketShopSearchStatus" aria-live="polite"></p>
    <div class="shop-bubble-grid" id="liveMarketShopGrid">
    </div>
  </main>
  <script src="./session-device.js?v=20260501sess1"></script>
  <script src="./page-i18n.js?v=20260502layoutlift1"></script>
  <script src="./live-market-shops.js?v=20260504shopsdirect1"></script>
  <script src="./site-chrome.js?v=20260510inbox1" defer></script>
</body>
</html>
