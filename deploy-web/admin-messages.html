<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>VibeCart Admin Messages</title>
    <link rel="stylesheet" href="./styles.css?v=20260424mobnav1" />
  </head>
  <body class="admin-surface">
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark">V</span>
        <span class="brand-name">VibeCart Messages</span>
      </div>
      <nav class="nav-links">
        <a href="./admin.html">Back to Admin</a>
      </nav>
    </header>
    <main class="message-page section alt">
      <h1>Message Center</h1>
      <p class="note">Important updates, requests, and urgent notices appear here.</p>
      <div class="message-page-actions">
        <button id="msgTabAll" type="button" class="btn btn-secondary">All</button>
        <button id="msgTabUnread" type="button" class="btn btn-secondary">Unread</button>
        <button id="msgTabUrgent" type="button" class="btn btn-secondary">Urgent</button>
        <button id="msgTabRequest" type="button" class="btn btn-secondary">Requests</button>
      </div>
      <div class="message-page-actions">
        <select id="msgType">
          <option value="request">request</option>
          <option value="urgent">urgent</option>
          <option value="system">system</option>
        </select>
        <input id="msgInput" type="text" placeholder="Add update, request, or reminder..." />
        <button id="msgAdd" type="button" class="btn btn-primary">Add</button>
        <button id="msgMarkRead" type="button" class="btn btn-secondary">Mark All Read</button>
        <button id="msgClear" type="button" class="btn btn-secondary">Clear All</button>
      </div>
      <div id="msgList" class="admin-message-list"></div>
    </main>
    <script src="./admin-messages.js?v=20260426msg1"></script>
  </body>
</html>
