<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>VibeCart Admin App</title>
    <meta name="theme-color" content="#0b1226" />
    <link rel="manifest" href="./admin-app-manifest.json" />
    <link rel="stylesheet" href="./admin-app.css?v=20260420csp1" />
  </head>
  <body>
    <main class="wrap">
      <section class="card shine">
        <h1>VibeCart Admin App</h1>
        <p class="small">Admin-only application entry. Use your owner credentials in the panel before making changes.</p>
        <button id="installAdminApp" class="btn hidden">Install Admin App</button>
      </section>

      <section id="gateCard" class="card">
        <h2>Admin Device Gate</h2>
        <p class="small">Set a local admin device PIN for quick access on this phone only.</p>
        <input id="devicePin" type="password" placeholder="Enter admin device PIN (min 6 chars)" />
        <button id="openPanelInApp" class="btn">Open Admin Panel</button>
      </section>

      <section id="panelCard" class="card hidden">
        <h2>Owner Panel (App Mode)</h2>
        <p class="small">Opening secure owner panel...</p>
      </section>
    </main>

    <script src="./admin-app.js?v=20260420csp1"></script>
  </body>
</html>
