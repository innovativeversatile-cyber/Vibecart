<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Service Provider Hub · VibeCart</title>
  <meta name="description" content="Set up beauty and service booking offers with visual service previews, package guidance, and prepayment-ready booking routes." />
  <link rel="canonical" href="https://vibe-cart.com/service-provider-hub.html" />
  <link rel="stylesheet" href="./styles.css?v=20260510laneflat1" />
  <style>
    /* Same-origin bundled stills (see ./media/provider-*-1.jpg). */
    #spHeroMotion.vc-visual-motion {
      background-color: #1a0f24;
      background-image: linear-gradient(
          145deg,
          rgba(26, 15, 36, 0.2),
          rgba(10, 13, 24, 0.45)
        ),
        url("./media/provider-hair-1.jpg");
      background-size: cover, cover;
      background-position: center, center;
    }
  </style>
</head>
<body class="start-selling-page" data-vc-lean-hud="1">
  <header class="shops-lane-topbar">
    <a href="./my-business.html" class="btn btn-secondary">Back</a>
    <h1 class="shops-lane-title" id="spHubTitle">Provider Booking Template</h1>
  </header>
  <main class="section">
    <p class="note" id="spHubLead">Set your business details and prepayment route so clients pay before their date is secured.</p>
    <div class="vc-visual-hero" id="spVisualHero">
      <img class="vc-visual-hero__mark" src="./icon-maskable.svg" alt="" width="64" height="64" decoding="async" />
      <div class="vc-visual-motion" id="spHeroMotion" role="img" aria-label="Service preview">
        <img
          id="spHeroMotionImg"
          class="vc-visual-motion__media"
          src="./media/provider-hair-1.jpg"
          alt="Service booking preview"
          loading="eager"
          decoding="async"
          fetchpriority="high"
        />
      </div>
    </div>
    <div id="spVisualDeck" class="vc-visual-grid"></div>
    <div class="admin-grid">
      <label for="spBusinessName">Business name</label>
      <input id="spBusinessName" type="text" placeholder="Example: Papa Fresh Cuts" />
      <label for="spServiceType">Main service</label>
      <input id="spServiceType" type="text" placeholder="Bakery / Barber / Hair / Nails / Makeup" />
      <label for="spPaymentUrl">Payment link (required prepay route)</label>
      <input id="spPaymentUrl" type="url" placeholder="https://yourpay.example/checkout" />
      <label for="spDepositAmount">Deposit amount</label>
      <input id="spDepositAmount" type="number" min="0" step="0.01" placeholder="10.00" />
      <label for="spPaymentMethod">Preferred payment method</label>
      <select id="spPaymentMethod">
        <option value="card">Bank card</option>
        <option value="blik">BLIK</option>
        <option value="cash">Cash on appointment</option>
        <option value="bank-transfer">Bank transfer</option>
      </select>
    </div>
    <div class="hero-actions" style="margin-top:1rem;">
      <button id="spSave" class="btn btn-primary" type="button">Save provider template</button>
      <button id="spGenerate" class="btn btn-secondary" type="button">Generate booking checkout link</button>
      <button id="spPublishNow" class="btn btn-primary" type="button">Publish now (provider dashboard)</button>
      <button id="spAiGenerate" class="btn btn-secondary" type="button">Generate AI dashboard blocks</button>
    </div>
    <div id="spStatus" class="ai-result"></div>
    <div id="spOutput" class="ai-result"></div>
    <div id="spAiPolish" class="ai-result"></div>
    <div id="spAiBlocks" class="ai-result"></div>
    <div id="spShareLinkBox" class="ai-result"></div>
    <section class="ai-result" style="margin-top:0.75rem;">
      <h3 style="margin-top:0;">Provider AI Control Center</h3>
      <p class="note">Describe your ideal provider dashboard sections and let AI build them.</p>
      <label for="spAiRequirements">AI dashboard requirements</label>
      <textarea id="spAiRequirements" rows="4" placeholder="Example: I am a hairstylist. Add VIP queue, same-day slot filler, treatment tracker, repeat-client nudges, and policy alerts."></textarea>
      <div class="hero-actions" style="margin-top:0.65rem;">
        <button id="spAiBuildDashboard" class="btn btn-primary" type="button">Build my unique AI dashboard</button>
        <button id="spAiResetDashboard" class="btn btn-secondary" type="button">Reset AI dashboard</button>
        <a id="spOpenProviderDashboard" class="btn btn-secondary" href="./my-business.html?force_provider=1">Open provider dashboard</a>
      </div>
    </section>
  </main>

  <script src="./session-device.js?v=20260510sess1"></script>
  <script src="./vibecart-ai-client.js?v=20260510sphub1" defer></script>
  <script src="./site-chrome.js?v=20260510sphub1" defer></script>
  <script src="./service-provider-hub.js?v=20260510sphub1" defer></script>

</body>
</html>
