<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seller Boost &amp; growth AI · VibeCart</title>
  <link rel="stylesheet" href="./styles.css?v=20260426flowqa1" />
</head>
<body class="shops-lane-page start-selling-page">
  <header class="shops-lane-topbar">
    <a class="btn btn-secondary" href="./index.html">← <span data-page-i18n="common.home">Home</span></a>
    <a class="btn btn-primary" href="./sell-journey.html" data-page-i18n="seller.checklist">Selling checklist</a>
  </header>
  <main class="section alt shops-lane-main">
    <h1 class="shops-lane-title" data-page-i18n="seller.title">Seller Boost</h1>
    <p class="note shops-lane-intro" data-page-i18n="seller.intro">Growth tools stay in one clean workspace.</p>
    <p class="hero-actions">
      <a class="btn btn-primary" href="./sell-journey.html">Continue seller setup</a>
      <a class="btn btn-secondary" href="./seller-live-preview.html">Open live preview</a>
    </p>
    <section style="margin-top:1rem">
      <h2>Listing progress</h2>
      <p class="note" id="sellerProgressStatus">No listing published yet.</p>
      <p class="hero-actions"><a class="btn btn-secondary" href="./live-market-shops.html?cat=All&view=global">Open global market</a></p>
    </section>
  </main>
  <script src="./page-i18n.js?v=20260426lang2"></script>
  <script>
    (function () {
      var status = document.getElementById("sellerProgressStatus");
      if (!status) return;
      try {
        var raw = localStorage.getItem("vibecart-seller-live-listing");
        if (!raw) return;
        var listing = JSON.parse(raw);
        if (!listing || !listing.title) return;
        status.textContent =
          "Live listing: " +
          listing.title +
          " · Price: " +
          (listing.currency || "EUR") +
          " " +
          (listing.price || "0") +
          " · Status: " +
          (listing.status || "Live");
      } catch {
        /* ignore */
      }
    })();
  </script>
  <script src="./site-chrome.js?v=20260421chrome1" defer></script>
</body>
</html>
