<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live market lanes · VibeCart</title>
  <meta name="description" content="Choose popular market or full live market shops." />
  <link rel="stylesheet" href="./styles.css?v=20260419flow1" />
</head>
<body class="shops-lane-page">
  <header class="shops-lane-topbar">
    <a class="btn btn-secondary" href="./index.html">← <span data-page-i18n="common.home">Home</span></a>
    <a class="btn btn-primary" href="./hot-picks.html" data-page-i18n="live.openPicks">Open live picks</a>
  </header>
  <main class="section alt shops-lane-main">
    <h1 class="shops-lane-title" data-page-i18n="live.title">Live market folders</h1>
    <p class="note shops-lane-intro" data-page-i18n="live.intro">Pick a focused popular lane or the full live-market lane.</p>
    <div class="shop-bubble-grid">
      <a class="shop" href="./popular-market.html">
        <h3 data-page-i18n="live.popular.title">Popular market</h3>
        <p data-page-i18n="live.popular.desc">Trending categories and faster browse path.</p>
      </a>
      <a class="shop" href="./live-market-shops.html">
        <h3 data-page-i18n="live.shops.title">Live market shops</h3>
        <p data-page-i18n="live.shops.desc">All live listings and full product grid.</p>
      </a>
    </div>
  </main>
  <script src="./page-i18n.js?v=20260426lang2"></script>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var lane = String(params.get("lane") || "").trim().toLowerCase();
      var cat = String(params.get("cat") || "").trim();
      if (lane === "popular") {
        var target = "./popular-market.html" + (cat ? ("?cat=" + encodeURIComponent(cat)) : "");
        window.location.replace(target);
      }
    })();
  </script>
  <script src="./site-chrome.js?v=20260421chrome1" defer></script>
</body>
</html>
