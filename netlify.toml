# Public API: proxied from this site as /api/* → your Railway Node service (avoids DNS on api.* until you add it).
# Replace the hostname below with Railway → your API service → Settings → Networking → public URL (…up.railway.app).
[build]
  publish = "deploy-web"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Avoid stale HTML after deploys (CSS/JS use ?v= cache-bust in markup).
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Service worker must always revalidate or users stay on old cached site forever.
[[headers]]
  for = "/service-worker.js"
  [headers.values]
    Cache-Control = "no-store, max-age=0, must-revalidate"

[[redirects]]
  from = "/api/*"
  to = "https://vibecart-api-production.up.railway.app/api/:splat"
  status = 200
  force = true
