# Update the Railway URL below if your backend hostname changes.
[build]
  publish = "deploy-web"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

[[redirects]]
  from = "/api/*"
  to = "https://vibecart-production.up.railway.app/api/:splat"
  status = 200
  force = true
