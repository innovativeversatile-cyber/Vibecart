# Public API: proxied from this site as /api/* → your Railway **Node/web** service (not MySQL).
# In Railway open your **project**, select the service that runs `npm start` / owner-auth-api.js, then
# Settings → Networking → public URL (…up.railway.app) and paste ONLY that host below.
# Project reference: https://railway.com/project/1521e97a-cf77-4f42-9c97-a60d32cbdbf7
# If /api/health returns 404 "Application not found", this hostname is wrong or that Railway service is gone.
# Explicit no-op build: avoids long default Node installs when Netlify detects root package.json.
[build]
  publish = "deploy-web"
  command = "exit 0"

[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=63072000; includeSubDomains"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-Permitted-Cross-Domain-Policies = "none"
    X-XSS-Protection = "0"
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Resource-Policy = "same-origin"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    # Tighten over time (hashes for JSON-LD, drop unsafe-inline on script-src once hashed). Service worker registration is in script.js (no inline handlers).
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; form-action 'self' https:; frame-ancestors 'none'; frame-src 'none'; object-src 'none'; block-all-mixed-content; upgrade-insecure-requests; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: blob:; font-src 'self' data:; connect-src 'self' https://vibecart-production.up.railway.app https://*.up.railway.app https://vibe-cart.com https://*.netlify.app https://images.unsplash.com; worker-src 'self'; manifest-src 'self'; media-src 'self' https:"

# Avoid stale HTML after deploys (CSS/JS use ?v= cache-bust in markup).
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Service worker must always revalidate or users stay on old cached site forever.
[[headers]]
  for = "/service-worker.js"
  [headers.values]
    Cache-Control = "no-store, max-age=0, must-revalidate"

[[redirects]]
  from = "/medication-support.html"
  to = "/wellbeing.html"
  status = 301

[[redirects]]
  from = "/api/*"
  to = "https://vibecart-production.up.railway.app/api/:splat"
  status = 200
  force = true
