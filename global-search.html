<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Global Search · VibeCart</title>
  <link rel="stylesheet" href="./styles.css?v=20260424mobnav1" />
</head>
<body class="admin-surface">
  <header class="shops-lane-topbar">
    <a href="./index.html" class="btn btn-secondary">Back</a>
    <h1 class="shops-lane-title">Search everything</h1>
  </header>
  <main class="section">
    <form id="globalSearchForm" class="shop-search" role="search" aria-label="Global search">
      <input id="globalSearchInput" class="shop-search-input" type="search" placeholder="Search VibeCart, app pages, or web..." />
      <button class="btn btn-primary" type="submit">Search</button>
    </form>
    <p id="globalSearchStatus" class="note"></p>
    <div id="globalSearchSiteResults" class="messages-box"></div>
    <div class="hero-actions" style="margin-top:0.8rem;">
      <a id="globalWebSearchBtn" class="btn btn-secondary" href="#" target="_blank" rel="noopener noreferrer">Search web</a>
      <a id="globalGoogleSearchBtn" class="btn btn-secondary" href="#" target="_blank" rel="noopener noreferrer">Search Google</a>
    </div>
  </main>
  <script src="./global-search.js?v=global-search-2" defer></script>
  <script src="./site-chrome.js?v=20260421chrome1" defer></script>
</body>
</html>
