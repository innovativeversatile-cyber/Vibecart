<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Service Provider Hub · VibeCart</title>
  <meta name="description" content="Set up beauty and service booking offers with visual service previews, package guidance, and prepayment-ready booking routes." />
  <link rel="canonical" href="https://vibe-cart.com/service-provider-hub.html" />
  <link rel="stylesheet" href="./styles.css?v=20260502bundlehero1" />
  <style>
    /* Same-origin bundled still — works when in-app WebViews block images.unsplash.com. */
    #spHeroMotion.vc-visual-motion {
      background-color: #1a0f24;
      background-image: linear-gradient(
          145deg,
          rgba(26, 15, 36, 0.2),
          rgba(10, 13, 24, 0.45)
        ),
        url("./media/provider-hero-default.jpg");
      background-size: cover, cover;
      background-position: center, center;
    }
  </style>
</head>
<body class="start-selling-page" data-vc-lean-hud="1">
  <header class="shops-lane-topbar">
    <a href="./my-business.html" class="btn btn-secondary">Back</a>
    <h1 class="shops-lane-title" id="spHubTitle">Provider Booking Template</h1>
  </header>
  <main class="section">
    <p class="note" id="spHubLead">Set your business details and prepayment route so clients pay before their date is secured.</p>
    <div class="vc-visual-hero" id="spVisualHero">
      <img class="vc-visual-hero__mark" src="./icon-maskable.svg" alt="" width="64" height="64" decoding="async" />
      <div class="vc-visual-motion" id="spHeroMotion" role="img" aria-label="Service preview">
        <img
          id="spHeroMotionImg"
          class="vc-visual-motion__media"
          src="./media/provider-hero-default.jpg"
          alt="Service booking preview"
          loading="eager"
          decoding="async"
          fetchpriority="high"
        />
      </div>
    </div>
    <div id="spVisualDeck" class="vc-visual-grid"></div>
    <div class="admin-grid">
      <label for="spBusinessName">Business name</label>
      <input id="spBusinessName" type="text" placeholder="Example: Papa Fresh Cuts" />
      <label for="spServiceType">Main service</label>
      <input id="spServiceType" type="text" placeholder="Bakery / Barber / Hair / Nails / Makeup" />
      <label for="spPaymentUrl">Payment link (required prepay route)</label>
      <input id="spPaymentUrl" type="url" placeholder="https://yourpay.example/checkout" />
      <label for="spDepositAmount">Deposit amount</label>
      <input id="spDepositAmount" type="number" min="0" step="0.01" placeholder="10.00" />
      <label for="spPaymentMethod">Preferred payment method</label>
      <select id="spPaymentMethod">
        <option value="card">Bank card</option>
        <option value="blik">BLIK</option>
        <option value="cash">Cash on appointment</option>
        <option value="bank-transfer">Bank transfer</option>
      </select>
    </div>
    <div class="hero-actions" style="margin-top:1rem;">
      <button id="spSave" class="btn btn-primary" type="button">Save provider template</button>
      <button id="spGenerate" class="btn btn-secondary" type="button">Generate booking checkout link</button>
    </div>
    <div id="spStatus" class="ai-result"></div>
    <div id="spOutput" class="ai-result"></div>
    <div id="spAiPolish" class="ai-result"></div>
  </main>
  <script>
    (function () {
      var KEY = "vibecart-service-provider-template";
      var name = document.getElementById("spBusinessName");
      var service = document.getElementById("spServiceType");
      var pay = document.getElementById("spPaymentUrl");
      var dep = document.getElementById("spDepositAmount");
      var method = document.getElementById("spPaymentMethod");
      var status = document.getElementById("spStatus");
      var out = document.getElementById("spOutput");
      var aiPolish = document.getElementById("spAiPolish");
      var save = document.getElementById("spSave");
      var gen = document.getElementById("spGenerate");
      var title = document.getElementById("spHubTitle");
      var lead = document.getElementById("spHubLead");
      var deck = document.getElementById("spVisualDeck");
      var params = new URLSearchParams(window.location.search || "");
      var serviceHint = String(params.get("service") || "").trim();
      var slotHint = String(params.get("slot") || "").trim();
      var HERO_SAME_ORIGIN_STILL = "./media/provider-hero-default.jpg";
      var HERO_ICON_FALLBACK = "./icon-maskable.svg";
      var motionStill = {
        "Hair Styling": [
          "https://images.unsplash.com/photo-1560066984-138d9534a059?auto=format&fit=crop&w=1600&q=82",
          "https://images.unsplash.com/photo-1573496359142-b80d948464d4?auto=format&fit=crop&w=1600&q=82",
          "https://images.unsplash.com/photo-1503951914875-89f26e475d27?auto=format&fit=crop&w=1600&q=82"
        ],
        Nails: [
          "https://images.unsplash.com/photo-1604654894610-df63bc536371?auto=format&fit=crop&w=1600&q=82",
          "https://images.unsplash.com/photo-1610992652870-b7dcdc4c77cb?auto=format&fit=crop&w=1600&q=82",
          "https://images.unsplash.com/photo-1519014816548-bf5898892bb9?auto=format&fit=crop&w=1600&q=82"
        ],
        Makeup: [
          "https://images.unsplash.com/photo-1522337360788-8b13dee7a37e?auto=format&fit=crop&w=1600&q=82",
          "https://images.unsplash.com/photo-1487412720507-eb43ef43ca66?auto=format&fit=crop&w=1600&q=82",
          "https://images.unsplash.com/photo-1596462508899-7b3ebc3df4f0?auto=format&fit=crop&w=1600&q=82"
        ],
        Barber: [
          "https://images.unsplash.com/photo-1599351431202-1e0f0137899a?auto=format&fit=crop&w=1600&q=82",
          "https://images.unsplash.com/photo-1621605815976-792b3f1c7c36?auto=format&fit=crop&w=1600&q=82",
          "https://images.unsplash.com/photo-1503951914875-89f26e475d27?auto=format&fit=crop&w=1600&q=82"
        ],
        "Bakery / custom cakes": [
          "https://images.unsplash.com/photo-1578985545062-69928b1d9587?auto=format&fit=crop&w=1600&q=82",
          "https://images.unsplash.com/photo-1464346575507-95eca0c2d585?auto=format&fit=crop&w=1600&q=82",
          "https://images.unsplash.com/photo-1558961363-fa8fdf82db35?auto=format&fit=crop&w=1600&q=82"
        ]
      };
      function hashMotionSalt(s) {
        var str = String(s || "");
        var h = 0;
        for (var i = 0; i < str.length; i++) {
          h = (h * 31 + str.charCodeAt(i)) | 0;
        }
        return Math.abs(h);
      }
      function resolveMotionUrl(entry, salt) {
        if (!entry) return HERO_SAME_ORIGIN_STILL;
        if (typeof entry === "string") return entry;
        if (entry.length) return entry[hashMotionSalt(salt) % entry.length];
        return HERO_SAME_ORIGIN_STILL;
      }
      function motionFromFreeText(t) {
        var s = String(t || "").toLowerCase();
        if (/bake|cake|cupcake|wedding cake|pastry|sweet|dessert|tier/.test(s)) return motionStill["Bakery / custom cakes"];
        if (/nail|manicure|pedicure|gel|acrylic/.test(s)) return motionStill.Nails;
        if (/makeup|glam|bridal|cosmetic|mua/.test(s)) return motionStill.Makeup;
        if (/barber|fade|beard|clipper|cut\s*men/.test(s)) return motionStill.Barber;
        return motionStill["Hair Styling"];
      }
      function applyHeroMotion(themeKey, freeText) {
        var img = document.getElementById("spHeroMotionImg");
        var box = document.getElementById("spHeroMotion");
        if (!img) return;
        var key = themeKey && motionStill[themeKey] ? themeKey : "";
        var entry = key ? motionStill[key] : motionFromFreeText(freeText);
        var salt = String(freeText || "") + "|" + String(serviceHint || "") + "|" + String((name && name.value) || "");
        var url = resolveMotionUrl(entry, salt);
        var remoteUrls = [];
        if (url && String(url).indexOf("http") === 0) remoteUrls.push(url);
        if (entry && typeof entry === "object" && entry.length) {
          for (var fi = 0; fi < entry.length; fi++) {
            var u = entry[fi];
            if (u && String(u).indexOf("http") === 0 && remoteUrls.indexOf(u) < 0) remoteUrls.push(u);
          }
        } else if (typeof entry === "string" && entry.indexOf("http") === 0 && remoteUrls.indexOf(entry) < 0) {
          remoteUrls.push(entry);
        }
        var pool = remoteUrls.slice();
        pool.push(HERO_SAME_ORIGIN_STILL);
        var attempt = 0;
        img.onerror = function () {
          attempt += 1;
          if (attempt < pool.length) {
            img.src = pool[attempt];
            return;
          }
          img.onerror = null;
          img.src = HERO_ICON_FALLBACK;
        };
        img.src = pool.length ? pool[0] : HERO_SAME_ORIGIN_STILL;
        img.alt = (key || "Service") + " — booking preview";
        if (box) box.setAttribute("aria-label", (key || String(freeText || "Service").trim() || "Service") + " preview");
      }
      var serviceThemes = {
        "Hair Styling": {
          title: "Hair styling booking studio",
          lead: "Showcuts, braid sessions, and treatment packages with visual expectations and timing clarity.",
          bullets: ["Wash + treatment variations", "Protective style bundles", "Quick restyle slots"]
        },
        "Nails": {
          title: "Nails booking studio",
          lead: "Guide clients through finish style, refill timing, and care follow-up before they pay.",
          bullets: ["Gel / acrylic choice guidance", "Fill vs full set pathways", "Aftercare highlights"]
        },
        "Makeup": {
          title: "Makeup booking studio",
          lead: "Package event, glam, and soft-look routes with clear prep notes and slot durations.",
          bullets: ["Bridal / event flow", "Skin prep checklist", "Look references by occasion"]
        },
        "Barber": {
          title: "Barber booking studio",
          lead: "Highlight cuts, fades, beard work, and timing so walk-ins become booked clients.",
          bullets: ["Fade and line-up tiers", "Beard detailing options", "Express vs full grooming"]
        },
        "Bakery / custom cakes": {
          title: "Bakery & custom cake booking studio",
          lead: "Show tiers, flavors, lead times, and deposit rules so celebration orders convert with clarity.",
          bullets: ["Wedding and event cake pathways", "Allergen and dietary notes", "Pickup vs delivery windows"]
        }
      };
      var activeTheme = serviceThemes[serviceHint] || serviceThemes["Hair Styling"];
      if (title) title.textContent = activeTheme.title;
      if (lead) {
        lead.textContent =
          activeTheme.lead + (slotHint ? " Selected slot context: " + slotHint + "." : "");
      }
      if (deck) {
        deck.innerHTML = activeTheme.bullets
          .map(function (item) {
            return (
              "<article class='vc-visual-step'><h3><img src='./icon.svg' alt='service step' />Service value</h3><p>" +
              item +
              "</p></article>"
            );
          })
          .join("");
      }
      function read() { try { return JSON.parse(localStorage.getItem(KEY) || "{}"); } catch { return {}; } }
      function write(v) { localStorage.setItem(KEY, JSON.stringify(v)); }
      var current = read();
      if (name) name.value = current.businessName || "";
      if (service) service.value = serviceHint || current.serviceType || "";
      if (pay) pay.value = current.paymentUrl || "";
      if (dep) dep.value = current.depositAmount || "";
      if (method) method.value = current.paymentMethod || "card";
      applyHeroMotion(serviceThemes[serviceHint] ? serviceHint : "", service ? service.value : "");
      if (service) {
        service.addEventListener(
          "input",
          function () {
            applyHeroMotion("", service.value);
          },
          { passive: true }
        );
      }
      if (save) save.addEventListener("click", function () {
        var payload = {
          businessName: String(name.value || "").trim(),
          serviceType: String(service.value || "").trim(),
          paymentUrl: String(pay.value || "").trim(),
          depositAmount: String(dep.value || "").trim(),
          paymentMethod: String((method && method.value) || "card").trim()
        };
        write(payload);
        if (status) status.textContent = "Provider template saved.";
      });
      if (gen) gen.addEventListener("click", function () {
        var data = read();
        var link = "./checkout-details.html?flow=service_booking&provider=" + encodeURIComponent(data.businessName || "Provider") +
          "&service=" + encodeURIComponent(data.serviceType || "Service") +
          "&deposit=" + encodeURIComponent(data.depositAmount || "0") +
          "&payUrl=" + encodeURIComponent(data.paymentUrl || "") +
          "&paymentMethod=" + encodeURIComponent(data.paymentMethod || "card");
        if (out) out.innerHTML = "Share this booking payment route:<br/><a class='btn btn-primary' href='" + link + "'>" + link + "</a>";
        if (status) {
          status.textContent = data.paymentUrl
            ? "Booking flow generated with external prepay link."
            : "Booking flow generated with internal VibeCart checkout.";
        }
        if (aiPolish) {
          aiPolish.textContent =
            "AI polish: " +
            (data.serviceType || "Service") +
            " route tuned. Emphasize before/after visuals, duration clarity, and one premium add-on in your listing text.";
        }
      });
    })();
  </script>
  <script src="./site-chrome.js?v=20260502bundlehero1" defer></script>
  <script>
    (function () {
      if (!document.body || document.body.getAttribute("data-vc-lean-hud") !== "1") return;
      var IDS = [
        "vcMotionModeBtn",
        "vcArrangeHud",
        "vcArrangeResetHud",
        "vcActionHub",
        "vcQuickActionTrigger",
        "vcVibeModeBtn",
        "vcStoryRail",
        "vcSocialPulse",
        "vcMissionHud",
        "vcDealDraftComposer",
        "vcMobileStreakChip",
        "vcMobileInboxPulse",
        "vcFirst5Bar"
      ];
      function stripLeanIntruders() {
        IDS.forEach(function (id) {
          var n = document.getElementById(id);
          if (n && n.parentNode) n.parentNode.removeChild(n);
        });
        var sh = document.getElementById("vcQuickActionSheet");
        if (sh && sh.parentNode) sh.parentNode.removeChild(sh);
      }
      stripLeanIntruders();
      window.addEventListener("load", stripLeanIntruders, { once: true });
      [50, 400, 1200, 2800].forEach(function (ms) {
        window.setTimeout(stripLeanIntruders, ms);
      });
      if (document.body && typeof MutationObserver !== "undefined") {
        try {
          var mo = new MutationObserver(stripLeanIntruders);
          mo.observe(document.body, { childList: true, subtree: false });
        } catch (e) {
          /* ignore */
        }
      }
    })();
  </script>
</body>
</html>
