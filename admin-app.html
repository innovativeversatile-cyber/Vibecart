<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VibeCart Admin App</title>
    <meta name="theme-color" content="#0b1226" />
    <link rel="manifest" href="./admin-app-manifest.json" />
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #070b17;
        color: #e9edff;
      }
      .wrap {
        max-width: 560px;
        margin: 0 auto;
        padding: 1rem;
      }
      .card {
        border: 1px solid #2a3459;
        border-radius: 14px;
        background: #0f1730;
        padding: 1rem;
        margin-bottom: 1rem;
      }
      .btn {
        display: inline-block;
        border: none;
        border-radius: 10px;
        background: #6d7dff;
        color: #0b1226;
        padding: 0.65rem 0.9rem;
        font-weight: 700;
        cursor: pointer;
        text-decoration: none;
      }
      .small {
        color: #a8b0d0;
        font-size: 0.92rem;
      }
      .hidden {
        display: none;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        border-radius: 10px;
        border: 1px solid #2a3459;
        background: #121b34;
        color: #e9edff;
        padding: 0.6rem 0.7rem;
        margin-bottom: 0.7rem;
      }
      iframe {
        width: 100%;
        height: 72vh;
        border: 1px solid #2a3459;
        border-radius: 12px;
        background: #fff;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="card">
        <h1>VibeCart Admin App</h1>
        <p class="small">Admin-only application entry. Use your owner credentials in the panel before making changes.</p>
        <button id="installAdminApp" class="btn hidden">Install Admin App</button>
      </section>

      <section id="gateCard" class="card">
        <h2>Admin Device Gate</h2>
        <p class="small">Set a local admin device PIN for quick access on this phone only.</p>
        <input id="devicePin" type="password" placeholder="Enter admin device PIN (min 6 chars)" />
        <button id="openPanelInApp" class="btn">Open Admin Panel</button>
      </section>

      <section id="panelCard" class="card hidden">
        <h2>Owner Panel (App Mode)</h2>
        <iframe src="./admin.html" title="VibeCart Admin Panel"></iframe>
      </section>
    </main>

    <script>
      const PIN_KEY = "vibecart-admin-device-pin";
      const gateCard = document.getElementById("gateCard");
      const panelCard = document.getElementById("panelCard");
      const pinInput = document.getElementById("devicePin");
      const openBtn = document.getElementById("openPanelInApp");
      const installBtn = document.getElementById("installAdminApp");
      let deferredPrompt = null;

      function hashPin(pin) {
        let hash = 0;
        for (let i = 0; i < pin.length; i += 1) {
          hash = (hash << 5) - hash + pin.charCodeAt(i);
          hash |= 0;
        }
        return String(hash);
      }

      function openPanel() {
        gateCard.classList.add("hidden");
        panelCard.classList.remove("hidden");
      }

      openBtn.addEventListener("click", () => {
        const value = String(pinInput.value || "").trim();
        if (value.length < 6) {
          alert("Use at least 6 characters for device PIN.");
          return;
        }
        const existing = localStorage.getItem(PIN_KEY);
        const hashed = hashPin(value);
        if (existing && existing !== hashed) {
          alert("Wrong device PIN.");
          return;
        }
        if (!existing) {
          localStorage.setItem(PIN_KEY, hashed);
        }
        openPanel();
      });

      window.addEventListener("beforeinstallprompt", (event) => {
        event.preventDefault();
        deferredPrompt = event;
        installBtn.classList.remove("hidden");
      });

      installBtn.addEventListener("click", async () => {
        if (!deferredPrompt) return;
        deferredPrompt.prompt();
        await deferredPrompt.userChoice;
        deferredPrompt = null;
        installBtn.classList.add("hidden");
      });

      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("./admin-app-sw.js").catch(() => {});
        });
      }
    </script>
  </body>
</html>
